<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>云栖小筑 · 浪漫首页</title>
  <style>
    /* 背景改为温柔的蓝色渐变 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d9e9fa 0%, #c2d9f0 100%); /* 温柔蓝调 */
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #2e3b4e; /* 深蓝灰色文字，更配蓝色背景 */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }

    /* 主容器 */
    .container {
      max-width: 440px;
      width: 90%;
      margin: 0 auto;
      background-color: transparent;
    }

    /* 浪漫页眉 */
    .header {
      margin-bottom: 32px;
      text-align: left;
      padding: 0 6px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 350;
      letter-spacing: 1px;
      color: #2c3e5c; /* 深蓝灰 */
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 2px 2px 4px rgba(90, 130, 180, 0.1);
    }

    /* logo图片比标题稍大 */
    .logo-img {
      height: 2.8rem;        /* 大于h1的2.2rem */
      width: auto;
      display: block;
      object-fit: contain;
    }

    .header .subhead {
      font-size: 1.1rem;
      color: #4a627a; /* 柔和深蓝 */
      margin-top: 8px;
      border-left: 4px solid #9bb7d4;
      padding-left: 18px;
      background: linear-gradient(to right, #e6f0fa, transparent);
      font-style: italic;
    }

    /* 卡片菜单 */
    .menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .menu li {
      width: 100%;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 18px 24px;
      text-decoration: none;
      color: #2e405b;
      box-shadow: 0 12px 24px -8px rgba(70, 110, 150, 0.2);
      transition: all 0.2s ease;
      border: 1px solid rgba(200, 220, 240, 0.6);
      -webkit-tap-highlight-color: transparent;
    }

    a.card:active {
      background: #e1edf9;
      transform: scale(0.98);
      box-shadow: 0 6px 12px rgba(50, 90, 130, 0.15);
    }

    .card-content {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 420;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2c405a;
    }

    .card-desc {
      font-size: 0.95rem;
      color: #55728f;
      letter-spacing: 0.3px;
    }

    .card-arrow {
      font-size: 2.2rem;
      line-height: 1;
      color: #7f9ebf;
      margin-left: 12px;
      transition: transform 0.2s;
      width: 36px;
      text-align: center;
    }

    a.card:hover .card-arrow {
      transform: translateX(5px);
    }

    /* 预留卡片 */
    .card.coming-soon {
      background: #ddeaf5;
      border: 1px dashed #aac3db;
      box-shadow: none;
      cursor: default;
      opacity: 0.85;
    }

    .card.coming-soon .card-title {
      color: #567594;
    }

    .card.coming-soon .card-desc {
      color: #6885a2;
    }

    .card.coming-soon .card-arrow {
      color: #99b6d4;
    }

    /* 额外提示区域 */
    .extra-note {
      background: transparent;
      padding: 16px 0 4px 6px;
      font-size: 0.9rem;
      color: #577594;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .extra-note i {
      font-style: normal;
      background: #d4e3f2;
      border-radius: 40px;
      padding: 6px 16px;
      box-shadow: 0 2px 6px rgba(100, 140, 180, 0.1);
    }

    /* 页脚 */
    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.9rem;
      color: #6183a5;
      padding: 20px 4px 8px;
      border-top: 1px solid #b6cee7;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 20px;
    }

    .footer span {
      background: #dae8f5;
      padding: 4px 16px;
      border-radius: 40px;
      color: #3d5e7c;
    }

    @media (max-width: 380px) {
      .card {
        padding: 16px 20px;
      }
      .card-title {
        font-size: 1.3rem;
      }
      .logo-img {
        height: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 浪漫头部：logo图片 + 空间名“云栖小筑” + 诗意短句 -->
    <div class="header">
      <h1>
        <img src="logo.png" alt="云栖小筑" class="logo-img">
        云栖小筑
      </h1>
      <div class="subhead">
        山间晨雾 · 藏着你想要的温柔
      </div>
    </div>

    <!-- 核心目录 -->
    <ul class="menu">
      <li>
        <a href="rlbwl.html" class="card">
          <span class="card-content">
            <span class="card-title">
              <span>📅</span> 日历备忘录
            </span>
            <span class="card-desc">每日印记 · 温暖如初</span>
          </span>
          <span class="card-arrow" aria-hidden="true">›</span>
        </a>
      </li>
      <li>
        <a href="sjdm.html" class="card">
          <span class="card-content">
            <span class="card-title">
              <span>🎡</span> 班级大转盘
            </span>
            <span class="card-desc">幸运轮盘 · 同窗小乐趣</span>
          </span>
          <span class="card-arrow" aria-hidden="true">›</span>
        </a>
      </li>
      <li>
        <div class="card coming-soon" aria-label="即将开放，敬请期待">
          <span class="card-content">
            <span class="card-title">
              <span>🌸</span> 花间集
            </span>
            <span class="card-desc">更多浪漫功能 · 酝酿中</span>
          </span>
          <span class="card-arrow" aria-hidden="true">⋯</span>
        </div>
      </li>
    </ul>

    <!-- 浪漫路线图 -->
    <div class="extra-note">
      <i>📖 时光手札</i>
      <i>🎐 风铃墙</i>
      <i>🌙 月光宝盒</i>
      <i>☕ 旧照片馆</i>
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <span>📌 日历备忘录 · 班级大转盘</span>
      <span>➕ 预留花间集</span>
      <span>📱 适手机 · 伴你朝暮</span>
    </div>
  </div>
</body>
</html>
