<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>数学百宝箱 · 云栖小筑</title>
  <style>
    /* 与首页保持完全一致的温柔蓝色风格 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d9e9fa 0%, #c2d9f0 100%);
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #2e3b4e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }

    .container {
      max-width: 440px;
      width: 90%;
      margin: 0 auto;
      background-color: transparent;
    }

    .header {
      margin-bottom: 32px;
      text-align: left;
      padding: 0 6px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 350;
      letter-spacing: 1px;
      color: #2c3e5c;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 2px 2px 4px rgba(90, 130, 180, 0.1);
    }

    .logo-img {
      height: 2.8rem;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .header .subhead {
      font-size: 1.1rem;
      color: #4a627a;
      margin-top: 8px;
      border-left: 4px solid #9bb7d4;
      padding-left: 18px;
      background: linear-gradient(to right, #e6f0fa, transparent);
      font-style: italic;
    }

    .menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .menu li {
      width: 100%;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 18px 24px;
      text-decoration: none;
      color: #2e405b;
      box-shadow: 0 12px 24px -8px rgba(70, 110, 150, 0.2);
      transition: all 0.2s ease;
      border: 1px solid rgba(200, 220, 240, 0.6);
      -webkit-tap-highlight-color: transparent;
    }

    a.card:active {
      background: #e1edf9;
      transform: scale(0.98);
      box-shadow: 0 6px 12px rgba(50, 90, 130, 0.15);
    }

    .card-content {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 420;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2c405a;
    }

    .card-desc {
      font-size: 0.95rem;
      color: #55728f;
      letter-spacing: 0.3px;
    }

    .card-arrow {
      font-size: 2.2rem;
      line-height: 1;
      color: #7f9ebf;
      margin-left: 12px;
      transition: transform 0.2s;
      width: 36px;
      text-align: center;
    }

    a.card:hover .card-arrow {
      transform: translateX(5px);
    }

    .card.coming-soon {
      background: #ddeaf5;
      border: 1px dashed #aac3db;
      box-shadow: none;
      cursor: default;
      opacity: 0.85;
    }

    .card.coming-soon .card-title {
      color: #567594;
    }

    .card.coming-soon .card-desc {
      color: #6885a2;
    }

    .card.coming-soon .card-arrow {
      color: #99b6d4;
    }

    .extra-note {
      background: transparent;
      padding: 16px 0 4px 6px;
      font-size: 0.9rem;
      color: #577594;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .extra-note i {
      font-style: normal;
      background: #d4e3f2;
      border-radius: 40px;
      padding: 6px 16px;
      box-shadow: 0 2px 6px rgba(100, 140, 180, 0.1);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 0.9rem;
      color: #6183a5;
      padding: 20px 4px 8px;
      border-top: 1px solid #b6cee7;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 20px;
    }

    .footer span {
      background: #dae8f5;
      padding: 4px 16px;
      border-radius: 40px;
      color: #3d5e7c;
    }

    @media (max-width: 380px) {
      .card {
        padding: 16px 20px;
      }
      .card-title {
        font-size: 1.3rem;
      }
      .logo-img {
        height: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 浪漫头部：保留logo和空间名，副标题调整为数学相关 -->
    <div class="header">
      <h1>
        <img src="logo.png" alt="云栖小筑" class="logo-img">
        数学百宝箱
      </h1>
      <div class="subhead">
        公式与浪漫 · 藏在数字里的温柔
      </div>
    </div>

    <!-- 功能卡片列表 -->
    <ul class="menu">
      <!-- 第一个按钮：三角函数三种变换，链接到 /sxbbx/sjhsszbh.html -->
      <li>
        <a href="sxbbx/sjhsszbh.html" class="card">
          <span class="card-content">
            <span class="card-title">
              <span>📐</span> 三角函数三种变换
            </span>
            <span class="card-desc">正弦余弦 · 变换之美</span>
          </span>
          <span class="card-arrow" aria-hidden="true">›</span>
        </a>
      </li>

      <!-- 新增加按钮：平面的法向量，指向 sxbbx/pmdfxl.html -->
      <li>
        <a href="sxbbx/pmdfxl.html" class="card">
          <span class="card-content">
            <span class="card-title">
              <span>🧭</span> 平面的法向量
            </span>
            <span class="card-desc">方向余弦 · 平面方程</span>
          </span>
          <span class="card-arrow" aria-hidden="true">›</span>
        </a>
      </li>

      <!-- 预留扩展卡片1：几何画板 (占位) -->
      <li>
        <div class="card coming-soon" aria-label="即将推出">
          <span class="card-content">
            <span class="card-title">
              <span>📏</span> 几何画板
            </span>
            <span class="card-desc">点线面体 · 筹备中</span>
          </span>
          <span class="card-arrow" aria-hidden="true">⋯</span>
        </div>
      </li>

      <!-- 预留扩展卡片2：公式手册 (占位) -->
      <li>
        <div class="card coming-soon" aria-label="即将推出">
          <span class="card-content">
            <span class="card-title">
              <span>📘</span> 公式手册
            </span>
            <span class="card-desc">代数几何 · 待解锁</span>
          </span>
          <span class="card-arrow" aria-hidden="true">⋯</span>
        </div>
      </li>

      <!-- 您可在此处继续添加更多卡片，只需复制 <li> 结构 -->
    </ul>

    <!-- 浪漫路线图：暗示未来扩展方向 -->
    <div class="extra-note">
      <i>🧩 概率统计</i>
      <i>⚡ 微积分初步</i>
      <i>🌀 向量空间</i>
      <i>🧮 数学史话</i>
    </div>

    <!-- 页脚，包含当前页面标识和预留提示 -->
    <div class="footer">
      <span>📌 三角函数三种变换</span>
      <span>➕ 几何画板 · 公式手册</span>
      <span>📱 伴你探索数学之美</span>
    </div>
  </div>
</body>
</html>
