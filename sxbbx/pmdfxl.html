<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>法向量演示 · 云栖小筑</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
      }
    }
  </script>
  <style>
    /* 完全沿用首页温柔蓝色风格 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #d9e9fa 0%, #c2d9f0 100%);
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
      color: #2e3b4e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }

    .container {
      max-width: 800px;
      width: 90%;
      margin: 0 auto;
      background-color: transparent;
    }

    .header {
      margin-bottom: 20px;
      text-align: left;
      padding: 0 6px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 350;
      letter-spacing: 1px;
      color: #2c3e5c;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 2px 2px 4px rgba(90, 130, 180, 0.1);
    }

    .logo-img {
      height: 2.8rem;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .header .subhead {
      font-size: 1.1rem;
      color: #4a627a;
      margin-top: 8px;
      border-left: 4px solid #9bb7d4;
      padding-left: 18px;
      background: linear-gradient(to right, #e6f0fa, transparent);
      font-style: italic;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 12px 24px -8px rgba(70, 110, 150, 0.2);
      border: 1px solid rgba(200, 220, 240, 0.6);
      margin-bottom: 24px;
    }

    .canvas-container {
      width: 100%;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: rgba(230, 240, 250, 0.3);
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      margin-top: 20px;
    }

    .slider-group {
      margin-bottom: 16px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      color: #2c405a;
      margin-bottom: 6px;
    }

    input[type=range] {
      width: 100%;
      height: 8px;
      background: #d4e3f2;
      border-radius: 10px;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #7f9ebf;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border: 2px solid white;
    }

    .vector-info {
      background: #eef4fa;
      border-radius: 24px;
      padding: 16px;
      margin: 20px 0 0;
      font-size: 0.95rem;
      color: #2e405b;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
    }

    .vector-info div {
      background: white;
      padding: 6px 14px;
      border-radius: 40px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.9rem;
      color: #6183a5;
      padding: 20px 4px 8px;
      border-top: 1px solid #b6cee7;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 20px;
    }

    .footer span {
      background: #dae8f5;
      padding: 4px 16px;
      border-radius: 40px;
      color: #3d5e7c;
    }

    @media (max-width: 500px) {
      .card {
        padding: 16px;
      }
      .header h1 {
        font-size: 1.8rem;
      }
      .logo-img {
        height: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <img src="logo.png" alt="云栖小筑" class="logo-img">
        数学百宝箱
      </h1>
      <div class="subhead">
        法向量 · 平面方向的灵魂
      </div>
    </div>

    <div class="card">
      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>

      <div class="control-panel">
        <div class="slider-group">
          <div class="slider-label">
            <span>X 分量</span>
            <span id="x-val">0.50</span>
          </div>
          <input type="range" id="x-slider" min="-1" max="1" step="0.01" value="0.5">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>Y 分量</span>
            <span id="y-val">0.50</span>
          </div>
          <input type="range" id="y-slider" min="-1" max="1" step="0.01" value="0.5">
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>Z 分量</span>
            <span id="z-val">0.50</span>
          </div>
          <input type="range" id="z-slider" min="-1" max="1" step="0.01" value="0.5">
        </div>
      </div>

      <div class="vector-info">
        <div>法向量: (<span id="nx">0.50</span>, <span id="ny">0.50</span>, <span id="nz">0.50</span>)</div>
        <div>单位向量: (<span id="ux">0.58</span>, <span id="uy">0.58</span>, <span id="uz">0.58</span>)</div>
      </div>
    </div>

    <div class="footer">
      <span>📐 平面方向由法向量唯一决定</span>
      <span>🖱️ 拖动滑块观察变化</span>
      <span>📱 可触摸 · 可旋转</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(3, 2, 4);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2;

    // 灯光
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0xccddff, 0.5);
    backLight.position.set(-1, -1, -1);
    scene.add(backLight);

    // 静态参考：坐标轴和网格（用户要求不要动）
    const axesHelper = new THREE.AxesHelper(3);
    scene.add(axesHelper);
    const gridHelper = new THREE.GridHelper(5, 20, 0x8899aa, 0xccddee);
    gridHelper.position.y = -0.01;
    scene.add(gridHelper);

    // --- 圆形平面（无描边，可旋转360°） ---
    const planeRadius = 2;
    const planeGeometry = new THREE.CircleGeometry(planeRadius, 64);
    const planeMaterial = new THREE.MeshPhongMaterial({
      color: 0x7fa9cf,
      side: THREE.DoubleSide,      // 双面可见
      transparent: true,
      opacity: 0.4,
      emissive: 0x112233,
      shininess: 30
    });
    const planeMesh = new THREE.Mesh(planeGeometry, planeMaterial);
    
    // 添加中心小点（帮助定位）
    const centerDot = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 16),
      new THREE.MeshStandardMaterial({ color: 0xffaa55 })
    );
    
    const planeGroup = new THREE.Group();
    planeGroup.add(planeMesh);
    planeGroup.add(centerDot);
    scene.add(planeGroup);

    // 法向量箭头
    const arrowColor = 0xff6666;
    const arrowLength = 1.8;
    const arrowHeadLength = 0.4;
    const arrowHeadWidth = 0.2;
    const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), arrowLength, arrowColor, arrowHeadLength, arrowHeadWidth);
    scene.add(arrowHelper);

    // 箭头末端小球
    const arrowTipSphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 8),
      new THREE.MeshStandardMaterial({ color: 0xff8888 })
    );
    scene.add(arrowTipSphere);

    // --- 交互滑块 ---
    const xSlider = document.getElementById('x-slider');
    const ySlider = document.getElementById('y-slider');
    const zSlider = document.getElementById('z-slider');
    const xVal = document.getElementById('x-val');
    const yVal = document.getElementById('y-val');
    const zVal = document.getElementById('z-val');
    const nxSpan = document.getElementById('nx');
    const nySpan = document.getElementById('ny');
    const nzSpan = document.getElementById('nz');
    const uxSpan = document.getElementById('ux');
    const uySpan = document.getElementById('uy');
    const uzSpan = document.getElementById('uz');

    let normal = new THREE.Vector3(0.5, 0.5, 0.5);

    function updateFromSliders() {
      const x = parseFloat(xSlider.value);
      const y = parseFloat(ySlider.value);
      const z = parseFloat(zSlider.value);
      
      xVal.textContent = x.toFixed(2);
      yVal.textContent = y.toFixed(2);
      zVal.textContent = z.toFixed(2);
      
      normal.set(x, y, z);
      
      const unit = normal.clone().normalize();
      
      nxSpan.textContent = normal.x.toFixed(2);
      nySpan.textContent = normal.y.toFixed(2);
      nzSpan.textContent = normal.z.toFixed(2);
      
      uxSpan.textContent = unit.x.toFixed(2);
      uySpan.textContent = unit.y.toFixed(2);
      uzSpan.textContent = unit.z.toFixed(2);
      
      // 旋转平面：默认法向量为 (0,0,1) 旋转至 unit
      const defaultDir = new THREE.Vector3(0, 0, 1);
      if (unit.length() > 0.001) {
        const quaternion = new THREE.Quaternion().setFromUnitVectors(defaultDir, unit);
        planeGroup.quaternion.copy(quaternion);
      }
      
      // 更新箭头方向
      arrowHelper.setDirection(unit);
      arrowTipSphere.position.copy(unit.clone().multiplyScalar(arrowLength));
    }

    xSlider.addEventListener('input', updateFromSliders);
    ySlider.addEventListener('input', updateFromSliders);
    zSlider.addEventListener('input', updateFromSliders);
    updateFromSliders(); // 初始化

    // 动画循环
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // 窗口自适应
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
      const container = document.querySelector('.canvas-container');
      const width = container.clientWidth;
      const height = container.clientHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    setTimeout(onWindowResize, 100);
  </script>
</body>
</html>
