<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>生活观察日记 · 每日笔记</title>
    <script src="https://unpkg.com/vue@3.2.47/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }

        /* 登录界面 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 24px;
            color: #b88b4a;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #6b5a3e;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e9e9ef;
            border-radius: 28px;
            font-size: 1rem;
            background: #fefaf5;
            outline: none;
        }
        .input-group input:focus {
            border-color: #d4af7a;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #d4af7a;
            color: white;
            border: none;
            border-radius: 48px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-btn:hover { background: #c29d60; }
        .error-msg { color: #e53935; margin-top: 12px; font-size: 0.9rem; }

        /* 日记卡片 */
        .diary-card {
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            overflow: hidden;
        }

        .header {
            padding: 24px 20px 16px;
            background: linear-gradient(135deg, #f9f3e6 0%, #fff5ea 100%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(120deg, #d4af7a, #b88b4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .sub {
            font-size: 0.85rem;
            color: #a28b5c;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #b88b4a;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: underline;
        }
        .date-section {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .date-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 500;
            color: #b88b4a;
            margin-bottom: 8px;
        }
        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-buttons {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            background: #f3ede5;
            border: none;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b88b4a;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-btn:active {
            background: #e6dacb;
            transform: scale(0.96);
        }
        input[type="date"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid #e9e9ef;
            border-radius: 28px;
            background: #fefaf5;
            font-weight: 500;
            outline: none;
        }
        input[type="date"]:focus {
            border-color: #d4af7a;
            box-shadow: 0 0 0 3px rgba(212, 175, 122, 0.2);
        }
        .today-btn {
            background: #f3ede5;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b88b4a;
            cursor: pointer;
            white-space: nowrap;
        }
        .today-btn:active {
            background: #e6dacb;
            transform: scale(0.96);
        }
        .diary-content {
            padding: 20px;
        }
        .editor-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            color: #6b5a3e;
            font-weight: 500;
        }
        .word-count {
            font-size: 0.7rem;
            background: #f4f0e8;
            padding: 4px 10px;
            border-radius: 30px;
            color: #8b7355;
        }
        textarea {
            width: 100%;
            min-height: 320px;
            padding: 18px;
            font-size: 1rem;
            line-height: 1.55;
            background: #fefcf9;
            border: 1.5px solid #ece4d9;
            border-radius: 24px;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #d4af7a;
            background-color: #fffefb;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            padding: 14px 0;
            border-radius: 48px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            background: none;
        }
        .btn-save {
            background: #d4af7a;
            color: white;
            box-shadow: 0 2px 6px rgba(180, 130, 70, 0.2);
        }
        .btn-save:active { background: #c29d60; transform: scale(0.97); }
        .btn-clear {
            background: #f2ede6;
            color: #8b7355;
            border: 1px solid #e4dbcf;
        }
        .btn-clear:active { background: #e8dfd4; }
        .btn-weather {
            background: #e7dfd1;
            color: #b88b4a;
            border: 1px solid #dacfbf;
        }
        .btn-weather:active { background: #ddd1bf; transform: scale(0.97); }
        .status-msg {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 20px;
            padding: 8px;
            border-radius: 40px;
            background: #f8f4ed;
            color: #b88b4a;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top-color: #d4af7a;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-hint {
            background: #fef7ef;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            color: #bc9a6a;
            font-size: 0.9rem;
            margin-top: 12px;
            border: 1px dashed #e9dccc;
        }
        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #b7aa93;
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .header h1 { font-size: 1.6rem; }
            .date-picker-wrapper { flex-direction: column; align-items: stretch; }
            .nav-buttons { justify-content: center; }
            textarea { min-height: 280px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 登录界面 -->
        <div v-if="!loggedIn" class="login-container">
            <div class="login-box">
                <h2>📔 生活观察日记</h2>
                <div class="input-group">
                    <label>邮箱</label>
                    <input type="email" v-model="loginEmail" @keyup.enter="login" placeholder="你的邮箱">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" v-model="loginPassword" @keyup.enter="login" placeholder="密码">
                </div>
                <button class="login-btn" @click="login" :disabled="loggingIn">
                    {{ loggingIn ? '登录中...' : '登录' }}
                </button>
                <div v-if="loginError" class="error-msg">{{ loginError }}</div>
            </div>
        </div>

        <!-- 日记主界面 -->
        <div v-else class="diary-card">
            <div class="header">
                <h1>📓 生活观察日记</h1>
                <div class="sub">记录细微瞬间 · 珍藏日常诗意</div>
                <button class="logout-btn" @click="logout">🚪 退出登录</button>
            </div>

            <div class="date-section">
                <div class="date-label">📅 选择日期</div>
                <div class="date-picker-wrapper">
                    <div class="nav-buttons">
                        <button class="nav-btn" @click="prevDay">← 前一天</button>
                        <button class="nav-btn" @click="nextDay">后一天 →</button>
                    </div>
                    <input type="date" v-model="selectedDate" @change="loadDiaryByDate" :max="todayStr">
                    <button class="today-btn" @click="jumpToToday">✨ 今天</button>
                </div>
            </div>

            <div class="diary-content">
                <div class="editor-label">
                    <span>🌿 今日观察笔记</span>
                    <span class="word-count">{{ contentLength }} 字</span>
                </div>

                <div v-if="loading" style="text-align:center; padding: 40px;">
                    <div class="loading-spinner"></div> 读取时光笔记...
                </div>

                <template v-else>
                    <textarea 
                        v-model="diaryText" 
                        placeholder="写一写今天观察到的细节吧：\n· 清晨窗台上的露珠\n· 咖啡馆里陌生人温暖的笑容\n· 路边梧桐叶的金边\n\n让平凡的日常发光✨"
                        @input="onTextChange"
                    ></textarea>
                </template>

                <div class="action-buttons">
                    <button class="btn-save" @click="saveDiary" :disabled="saving">
                        {{ saving ? '保存中...' : '💾 保存日记' }}
                    </button>
                    <button class="btn-weather" @click="insertWeatherInspiration" :disabled="weatherLoading">
                        {{ weatherLoading ? '获取天气中...' : '🌤️ 插入天气与灵感' }}
                    </button>
                    <button class="btn-clear" @click="clearCurrentText" :disabled="saving || loading">
                        🧹 清空
                    </button>
                </div>

                <div v-if="statusMessage" class="status-msg">
                    {{ statusMessage }}
                </div>
                <div v-if="!loading && !diaryText && !statusMessage" class="empty-hint">
                    ✨ 今天还没有记录，写点什么吧～
                </div>
            </div>
        </div>
        <footer>🌙 日记自动保存在云端 · 点击「插入天气与灵感」手动输入城市名获取天气（OpenWeatherMap）与美句</footer>
    </div>

    <script>
        (function(){
            const { createApp, ref, computed, onMounted } = Vue;
            const supabase = window.supabase;
            const dayjs = window.dayjs;

            // Supabase 配置
            const SUPABASE_URL = 'https://axvrvqivbxxrniaabogy.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_ufXYQAWGDWzCs5Vyb8zW1Q_AvWfxz9e';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 表名
            const TABLE_NAME = 'daily_observations';

            // ---------- OpenWeatherMap API 配置 ----------
            const OPENWEATHER_API_KEY = 'f1df2157f746b9176dbbb68743ebda10';
            
            /**
             * 通过 OpenWeatherMap API 获取指定城市的天气信息
             * 使用 Current Weather Data API (免费版，支持CORS)
             * @param {string} cityName 城市名称，支持中文或英文，如 "Xuzhou" "Beijing" "上海"
             * @returns {Promise<{ cityDisplay: string, weatherText: string }>}
             */
            const fetchWeatherByCityOpenWeather = async (cityName) => {
                // 1. 先尝试直接使用城市名获取天气（OpenWeatherMap 支持城市名+国家代码）
                // 注意：中文城市名可能无法识别，所以最好先用拼音或英文
                let cityQuery = cityName.trim();
                
                // 常见中文字段映射提示（不做强制转换，让API自己处理，但API对中文支持有限）
                // 为了更好的兼容性，可以简单判断如果是中文则尝试使用拼音映射（仅限几个常见城市）
                // 这里不做复杂映射，直接请求，如果失败会返回404
                
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cityQuery)}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=zh_cn`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.cod !== 200) {
                    // 如果请求失败，可能是城市名问题，给出友好提示
                    if (data.cod === '404') {
                        throw new Error(`未找到城市“${cityName}”，请尝试输入英文城市名（如 Beijing, Shanghai, Xuzhou）`);
                    } else if (data.cod === 401) {
                        throw new Error('OpenWeatherMap API Key 无效，请检查');
                    } else {
                        throw new Error(data.message || `API 返回错误码: ${data.cod}`);
                    }
                }
                
                // 成功获取天气
                const cityDisplay = data.name;  // API返回的标准城市名
                const temp = Math.round(data.main.temp);
                const weatherCondition = data.weather[0].description; // 中文天气描述（因为lang=zh_cn）
                const weatherIconCode = data.weather[0].icon;
                
                // 根据图标代码映射一个简单的表情符号
                let weatherEmoji = '🌤️';
                if (weatherIconCode.includes('01')) weatherEmoji = '☀️';     // 晴
                else if (weatherIconCode.includes('02')) weatherEmoji = '⛅';  // 少云
                else if (weatherIconCode.includes('03')) weatherEmoji = '☁️';  // 多云
                else if (weatherIconCode.includes('04')) weatherEmoji = '☁️';  // 阴
                else if (weatherIconCode.includes('09')) weatherEmoji = '🌧️';  // 小雨
                else if (weatherIconCode.includes('10')) weatherEmoji = '🌦️';  // 雨
                else if (weatherIconCode.includes('11')) weatherEmoji = '⛈️';  // 雷雨
                else if (weatherIconCode.includes('13')) weatherEmoji = '❄️';  // 雪
                else if (weatherIconCode.includes('50')) weatherEmoji = '🌫️';  // 雾
                
                const weatherDesc = `${weatherEmoji} ${weatherCondition} ${temp}℃`;
                return { cityDisplay, weatherText: weatherDesc };
            };

            // ---------- 优美句子库 ----------
            const INSPIRATION_QUOTES = [
                "Look at the stars. See their beauty. And in that beauty, see yourself. — Drea Stahr",
                "The world is full of magic things, patiently waiting for our senses to grow sharper. — W.B. Yeats",
                "Wherever you go, go with all your heart. — Confucius",
                "Every day brings a choice: to practice stress or to practice peace. — Joan Borysenko",
                "Let the beauty of what you love be what you do. — Rumi",
                "Joy is the simplest form of gratitude. — Karl Barth",
                "The earth has music for those who listen. — Shakespeare",
                "In the middle of difficulty lies opportunity. — Albert Einstein",
                "Do small things with great love. — Mother Teresa",
                "Happiness is not something ready made. It comes from your own actions. — Dalai Lama",
                "Rest and be kind, you don't have to prove anything. — Jack Kerouac",
                "Keep your face always toward the sunshine—and shadows will fall behind you. — Walt Whitman",
                "What you seek is seeking you. — Rumi",
                "The only journey is the one within. — Rainer Maria Rilke",
                "And then the day came, when the risk to remain tight in a bud was more painful than the risk it took to blossom. — Anaïs Nin",
                "Almost everything will work again if you unplug it for a few minutes, including you. — Anne Lamott",
                "Be gentle with yourself. You are a child of the universe, no less than the trees and the stars. — Max Ehrmann",
                "This is a wonderful day. I've never seen this one before. — Maya Angelou",
                "Sometimes the smallest step in the right direction ends up being the biggest step of your life. — Naeem Callaway",
                "The sun himself is weak when he first rises, and gathers strength and courage as the day gets on. — Charles Dickens",
                "Write it on your heart that every day is the best day in the year. — Ralph Waldo Emerson",
                "We are all in the gutter, but some of us are looking at the stars. — Oscar Wilde",
                "One small crack does not mean that you are broken, it means that you were put to the test and you didn't fall apart. — Linda Poindexter",
                "Your task is not to seek for love, but merely to seek and find all the barriers within yourself that you have built against it. — Rumi",
                "When you arise in the morning, think of what a precious privilege it is to be alive—to breathe, to think, to enjoy, to love. — Marcus Aurelius",
                "There is no path to happiness: happiness is the path. — Buddha",
                "The secret of getting ahead is getting started. — Mark Twain",
                "You are never too old to set another goal or to dream a new dream. — C.S. Lewis",
                "What lies behind us and what lies before us are tiny matters compared to what lies within us. — Ralph Waldo Emerson",
                "It does not matter how slowly you go as long as you do not stop. — Confucius"
            ];

            // 根据日期获取固定句子（每天不一样）
            const getDailyQuote = (dateStr) => {
                let hash = 0;
                for (let i = 0; i < dateStr.length; i++) {
                    hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
                    hash |= 0;
                }
                const index = Math.abs(hash) % INSPIRATION_QUOTES.length;
                return INSPIRATION_QUOTES[index];
            };

            const app = createApp({
                setup() {
                    // 登录状态
                    const loggedIn = ref(false);
                    const loginEmail = ref('');
                    const loginPassword = ref('');
                    const loginError = ref('');
                    const loggingIn = ref(false);
                    const currentUserId = ref(null);

                    // 日记状态
                    const selectedDate = ref('');
                    const diaryText = ref('');
                    const loading = ref(false);
                    const saving = ref(false);
                    const weatherLoading = ref(false);
                    const statusMessage = ref('');
                    let statusTimeout = null;
                    const todayStr = dayjs().format('YYYY-MM-DD');

                    // 辅助
                    const setStatusMessage = (msg) => {
                        if (statusTimeout) clearTimeout(statusTimeout);
                        statusMessage.value = msg;
                        statusTimeout = setTimeout(() => { statusMessage.value = ''; }, 3000);
                    };

                    // 登录方法
                    const login = async () => {
                        if (!loginEmail.value || !loginPassword.value) {
                            loginError.value = '请输入邮箱和密码';
                            return;
                        }
                        loggingIn.value = true;
                        loginError.value = '';
                        try {
                            const { data, error } = await supabaseClient.auth.signInWithPassword({
                                email: loginEmail.value,
                                password: loginPassword.value
                            });
                            if (error) throw error;
                            const user = data.user;
                            if (!user) throw new Error('登录失败');
                            currentUserId.value = user.id;
                            loggedIn.value = true;
                            initDate();
                            loadDiaryByDate();
                        } catch (err) {
                            loginError.value = err.message || '登录失败，请检查邮箱和密码';
                        } finally {
                            loggingIn.value = false;
                        }
                    };

                    const logout = async () => {
                        await supabaseClient.auth.signOut();
                        loggedIn.value = false;
                        loginEmail.value = '';
                        loginPassword.value = '';
                        currentUserId.value = null;
                    };

                    const initDate = () => {
                        selectedDate.value = todayStr;
                    };

                    const contentLength = computed(() => {
                        return diaryText.value ? diaryText.value.trim().length : 0;
                    });

                    const loadDiaryByDate = async () => {
                        if (!selectedDate.value || !currentUserId.value) return;
                        loading.value = true;
                        diaryText.value = '';
                        try {
                            const { data, error } = await supabaseClient
                                .from(TABLE_NAME)
                                .select('content')
                                .eq('user_id', currentUserId.value)
                                .eq('date', selectedDate.value)
                                .maybeSingle();

                            if (error) {
                                if (error.code === '42P01') {
                                    setStatusMessage('⚠️ 数据库表不存在，请创建 daily_observations 表');
                                } else {
                                    throw error;
                                }
                            } else if (data && data.content) {
                                diaryText.value = data.content;
                            }
                        } catch (err) {
                            console.error('加载失败:', err);
                            setStatusMessage('加载失败：' + err.message);
                        } finally {
                            loading.value = false;
                        }
                    };

                    const saveDiary = async () => {
                        if (saving.value) return;
                        if (!selectedDate.value || !currentUserId.value) return;
                        saving.value = true;
                        const trimmedContent = diaryText.value ? diaryText.value.trim() : '';

                        try {
                            const { data: existing, error: fetchError } = await supabaseClient
                                .from(TABLE_NAME)
                                .select('id')
                                .eq('user_id', currentUserId.value)
                                .eq('date', selectedDate.value)
                                .maybeSingle();

                            if (fetchError && fetchError.code !== 'PGRST116') throw fetchError;

                            if (trimmedContent === '') {
                                if (existing && existing.id) {
                                    const { error: delError } = await supabaseClient
                                        .from(TABLE_NAME)
                                        .delete()
                                        .eq('id', existing.id);
                                    if (delError) throw delError;
                                    setStatusMessage(`🗑️ 已删除 ${selectedDate.value} 的日记`);
                                    diaryText.value = '';
                                } else {
                                    setStatusMessage('日记为空，未作更改');
                                }
                                return;
                            }

                            if (existing && existing.id) {
                                const { error: updateError } = await supabaseClient
                                    .from(TABLE_NAME)
                                    .update({ content: trimmedContent, updated_at: new Date().toISOString() })
                                    .eq('id', existing.id);
                                if (updateError) throw updateError;
                                setStatusMessage(`✅ 日记已更新 (${selectedDate.value})`);
                            } else {
                                const { error: insertError } = await supabaseClient
                                    .from(TABLE_NAME)
                                    .insert({
                                        user_id: currentUserId.value,
                                        date: selectedDate.value,
                                        content: trimmedContent,
                                        created_at: new Date().toISOString(),
                                        updated_at: new Date().toISOString()
                                    });
                                if (insertError) throw insertError;
                                setStatusMessage(`✨ 日记已保存 (${selectedDate.value})`);
                            }
                        } catch (err) {
                            console.error('保存失败:', err);
                            setStatusMessage('保存失败：' + err.message);
                        } finally {
                            saving.value = false;
                        }
                    };

                    const clearCurrentText = () => {
                        if (diaryText.value.trim() === '') return;
                        diaryText.value = '';
                        setStatusMessage('已清空当前编辑，保存后生效');
                    };

                    const jumpToToday = () => {
                        if (selectedDate.value === todayStr) return;
                        selectedDate.value = todayStr;
                        loadDiaryByDate();
                    };

                    // 前一天 / 后一天
                    const prevDay = () => {
                        const newDate = dayjs(selectedDate.value).subtract(1, 'day');
                        selectedDate.value = newDate.format('YYYY-MM-DD');
                        loadDiaryByDate();
                    };

                    const nextDay = () => {
                        const newDate = dayjs(selectedDate.value).add(1, 'day');
                        if (newDate.isAfter(dayjs(), 'day')) {
                            setStatusMessage('不能查看未来的日记哦～');
                            return;
                        }
                        selectedDate.value = newDate.format('YYYY-MM-DD');
                        loadDiaryByDate();
                    };

                    const onTextChange = () => {};

                    // ---------- 插入天气与灵感：使用 OpenWeatherMap API ----------
                    const insertWeatherInspiration = async () => {
                        if (weatherLoading.value) return;
                        // 默认城市改为 Xuzhou（拼音，OpenWeatherMap 对拼音支持更好）
                        const defaultCity = 'Xuzhou';
                        const city = prompt('请输入城市名（建议使用英文/拼音，如 Xuzhou, Beijing, Shanghai）：', defaultCity);
                        if (!city || city.trim() === '') {
                            setStatusMessage('未输入城市名，取消插入');
                            return;
                        }
                        weatherLoading.value = true;
                        try {
                            const { cityDisplay, weatherText } = await fetchWeatherByCityOpenWeather(city.trim());
                            const todayReal = dayjs().format('YYYY年MM月DD日');
                            const dailyQuote = getDailyQuote(dayjs().format('YYYY-MM-DD'));
                            const weatherLine = `📍 ${cityDisplay}  ·  ${todayReal}  ·  ${weatherText}`;
                            const quoteLine = `✨ 今日灵感：${dailyQuote}`;
                            const insertion = `${weatherLine}\n${quoteLine}\n\n`;
                            const current = diaryText.value;
                            diaryText.value = current ? current + insertion : insertion;
                            setStatusMessage(`✅ 已插入 ${cityDisplay} 的天气（OpenWeatherMap）与灵感`);
                        } catch (err) {
                            console.error('天气获取错误:', err);
                            setStatusMessage(`❌ 获取天气失败：${err.message}`);
                        } finally {
                            weatherLoading.value = false;
                        }
                    };

                    // 自动恢复会话
                    const checkSession = async () => {
                        const { data: { session } } = await supabaseClient.auth.getSession();
                        if (session && session.user) {
                            currentUserId.value = session.user.id;
                            loggedIn.value = true;
                            initDate();
                            loadDiaryByDate();
                        }
                    };

                    onMounted(() => {
                        checkSession();
                    });

                    return {
                        loggedIn, loginEmail, loginPassword, loginError, loggingIn,
                        login, logout,
                        selectedDate, diaryText, loading, saving, weatherLoading,
                        statusMessage, contentLength, todayStr,
                        loadDiaryByDate, saveDiary, clearCurrentText, jumpToToday,
                        prevDay, nextDay, onTextChange, insertWeatherInspiration
                    };
                }
            });

            app.mount('#app');
        })();
    </script>
</body>
</html>
